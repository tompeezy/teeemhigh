<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#222;display:flex;gap:20px;padding:20px;align-items:flex-start; }
.icon {
  width:512px;height:512px;
  background:linear-gradient(135deg,#1a4731 0%,#2d7a4f 100%);
  border-radius:80px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:Arial,sans-serif;
  position:relative;overflow:hidden;
}
.icon::before {
  content:'';position:absolute;
  width:600px;height:600px;
  border-radius:50%;
  border:40px solid rgba(255,255,255,0.05);
  top:-100px;left:-100px;
}
.emoji { font-size:200px;line-height:1;margin-bottom:10px; }
.name { font-size:72px;font-weight:900;color:white;letter-spacing:-2px;text-align:center;line-height:1; }
.sub { font-size:36px;color:rgba(255,255,255,0.6);margin-top:8px; }
</style></head>
<body>
<div class="icon">
  <div class="emoji">⛳🍺</div>
  <div class="name">Fairway</div>
  <div class="sub">Hammered</div>
</div>
</body>
</html>
